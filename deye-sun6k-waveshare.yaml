substitutions:
  device_name: deye-sun6k-rs485
  friendly_name: "Deye SUN-6K RS485"
  modbus_address: "0x01"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Read-only Modbus RTU integration for Deye SUN-6K-SG05LP1-EU-AM2-P"
  project:
    name: "scrhall.deye_sun6k_waveshare"
    version: "1.0.0"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Deye-RS485 Fallback"
    password: !secret fallback_password

captive_portal:

# Pins confirmed by the official Waveshare ESP32-S3-RS485-CAN demo.
# The isolated transceiver switches TX/RX automatically: no flow_control_pin.
uart:
  id: inverter_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512

modbus:
  id: inverter_modbus
  uart_id: inverter_uart

modbus_controller:
  - id: deye
    address: ${modbus_address}
    modbus_id: inverter_modbus
    update_interval: 10s
    command_throttle: 100ms

# READ-ONLY: this file defines Holding Register sensors only.
# It contains no number/select/switch/button or Modbus write commands.
sensor:
  # Battery
  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Battery SOC"
    register_type: holding
    address: 184
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Battery Voltage"
    register_type: holding
    address: 183
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Battery Current"
    register_type: holding
    address: 191
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Battery Power"
    register_type: holding
    address: 190
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Battery Temperature"
    register_type: holding
    address: 182
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - offset: -1000
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Daily Battery Charge"
    register_type: holding
    address: 70
    value_type: U_WORD
    unit_of_measurement: "kWh"
