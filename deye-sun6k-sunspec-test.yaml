substitutions:
  device_name: deye-sun6k-sunspec-test
  friendly_name: "Deye SUN-6K SunSpec Test"
  modbus_address: "0x01"
  # SunSpec official clients scan 40000, then 0, then 50000.
  sunspec_base_address: "40000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Read-only SunSpec signature test for Deye SUN-6K-SG05LP1-EU-AM2-P"
  project:
    name: "scrhall.deye_sun6k_waveshare_sunspec_test"
    version: "1.0.0"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: VERY_VERBOSE
  logs:
    modbus: VERY_VERBOSE
    modbus_controller: VERY_VERBOSE

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Deye-SunSpec-Test Fallback"
    password: !secret fallback_password

captive_portal:

uart:
  id: inverter_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 256

modbus:
  id: inverter_modbus
  uart_id: inverter_uart

modbus_controller:
  - id: deye
    address: ${modbus_address}
    modbus_id: inverter_modbus
    update_interval: 15s
    command_throttle: 100ms

# READ-ONLY: function 03 Holding Register sensors only.
# Expected signature at the correct base: 0x5375 0x6E53 = ASCII "SunS".
sensor:
  - platform: modbus_controller
    modbus_controller_id: deye
    name: "SunSpec Signature Word 1"
    register_type: holding
    address: ${sunspec_base_address}
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: deye
    name: "SunSpec Signature Word 2"
    register_type: holding
    address: ${sunspec_base_address}
    offset: 2
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic
