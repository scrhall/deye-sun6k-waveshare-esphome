substitutions:
  device_name: deye-sun6k-rs485-test
  friendly_name: "Deye SUN-6K RS485 Test"
  modbus_address: "0x01"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Read-only two-register test for Deye SUN-6K-SG05LP1-EU-AM2-P"
  project:
    name: "scrhall.deye_sun6k_waveshare_test"
    version: "1.0.0"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: VERY_VERBOSE
  logs:
    modbus: VERY_VERBOSE
    modbus_controller: VERY_VERBOSE

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Deye-RS485-Test Fallback"
    password: !secret fallback_password

captive_portal:

uart:
  id: inverter_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 256

modbus:
  id: inverter_modbus
  uart_id: inverter_uart

modbus_controller:
  - id: deye
    address: ${modbus_address}
    modbus_id: inverter_modbus
    update_interval: 10s
    command_throttle: 100ms

# READ-ONLY: function 03 Holding Register sensors only.
sensor:
  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Battery SOC Test"
    register_type: holding
    address: 184
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: deye
    name: "Battery Voltage Test"
    register_type: holding
    address: 183
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
