name: Validate ESPHome

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create CI-only secrets
        run: |
          cp secrets.example.yaml secrets.yaml
          sed -i 's|YOUR_WIFI_PASSWORD|ci-password|; s|YOUR_WIFI|ci-network|; s|REPLACE_WITH_A_32_BYTE_BASE64_KEY|AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=|; s|REPLACE_WITH_OTA_PASSWORD|ci-ota-password|; s|REPLACE_WITH_AT_LEAST_8_CHARACTERS|ci-fallback-password|' secrets.yaml
      - uses: esphome/build-action@v7
        with:
          yaml-file: deye-sun6k-waveshare.yaml
          version: latest
          complete-manifest: true
